<!--
  УльтраКаркас — Страница детали проекта (динамическая)
  Tilda T123 Zero Block: вставьте в поле «HTML»
  JS: вставьте содержимое project.js в поле «JS»
  CSS: вставьте global.css в Настройки сайта → Свои стили

  Страница читает ?slug=... из URL и рендерит нужный проект.
  Пример URL в Tilda: /project/?slug=uyut

  Примечание: .inner-main добавляет padding-top:7–8rem под Tilda-шапку.
  При необходимости скорректируйте значение в CSS.
-->

<!-- Контейнер для динамического контента проекта -->
<main class="inner-main" id="project-detail"></main>

<!-- Лайтбокс для галереи -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <button class="close" id="lightbox-close" aria-label="Закрыть">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
  <button class="nav prev" id="lightbox-prev" aria-label="Предыдущее">&#8249;</button>
  <img id="lightbox-img" alt="">
  <button class="nav next" id="lightbox-next" aria-label="Следующее">&#8250;</button>
  <div class="counter" id="lightbox-counter"></div>
</div>

<!-- Modal mount (обязательно) -->
<div id="modal-mount"></div>
